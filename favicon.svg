<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ef2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff2fd1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" fill="#050816" rx="8"/>
  
  <!-- Lock body -->
  <rect x="20" y="30" width="24" height="22" rx="2" fill="url(#lockGradient)" opacity="0.9"/>
  <rect x="22" y="32" width="20" height="18" rx="1" fill="#0b1023"/>
  
  <!-- Lock shackle -->
  <path d="M 26 30 L 26 20 Q 26 14 32 14 Q 38 14 38 20 L 38 30" 
        stroke="url(#lockGradient)" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.9"/>
  
  <!-- Keyhole -->
  <circle cx="32" cy="40" r="3" fill="url(#lockGradient)"/>
  <rect x="30.5" y="40" width="3" height="6" rx="1" fill="url(#lockGradient)"/>
  
  <!-- Glow effect -->
  <rect x="20" y="30" width="24" height="22" rx="2" 
        fill="none" 
        stroke="#2ef2ff" 
        stroke-width="0.5" 
        opacity="0.6"
        style="filter: blur(1px)"/>
</svg>
